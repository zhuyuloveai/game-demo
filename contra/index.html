<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>赤色战线 · Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080a07; }
    body {
      font-family: -apple-system, "PingFang SC", sans-serif;
      color: #ffb37f;
    }
    #stage { position: fixed; inset: 0; }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0e0c;
    }
    /* 悬浮 HUD */
    .hud {
      position: absolute;
      top: 14px;
      display: flex;
      gap: 22px;
      padding: 8px 14px;
      background: rgba(10, 14, 10, 0.55);
      border: 1px solid rgba(255, 150, 60, 0.18);
      border-radius: 8px;
      backdrop-filter: blur(2px);
      pointer-events: none;
    }
    .hud.left { left: 14px; }
    .hud.right { right: 14px; }
    .hud .item { display: flex; align-items: baseline; gap: 6px; }
    .hud .label { font-size: 10px; letter-spacing: 2px; color: #c07840; }
    .hud .val {
      font-size: 18px;
      font-weight: 700;
      color: #ffd9b0;
      text-shadow: 0 0 8px rgba(255, 150, 60, 0.4);
    }
    .hint {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-size: 11px;
      color: rgba(192, 120, 64, 0.75);
      letter-spacing: 1px;
      pointer-events: none;
    }
    .key {
      display: inline-block;
      padding: 0 6px;
      border: 1px solid rgba(255, 150, 60, 0.3);
      border-radius: 4px;
      color: #ffc890;
      background: rgba(255, 150, 60, 0.06);
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div class="hud left">
      <div class="item"><span class="label">SCORE</span><span class="val" id="hud">0</span></div>
      <div class="item"><span class="label">BEST</span><span class="val" id="best">0</span></div>
    </div>
    <div class="hud right">
      <div class="item"><span class="label">击杀</span><span class="val" id="kills">0</span></div>
      <div class="item"><span class="label">存活</span><span class="val" id="time">0s</span></div>
    </div>
    <div class="hint">
      <span class="key">←→</span> 移动 · <span class="key">K</span> 跳跃 · <span class="key">J</span> 射击 · <span class="key">↑↓</span> 瞄准 · <span class="key">R</span> 重开
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
