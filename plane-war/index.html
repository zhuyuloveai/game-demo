<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>雷霆战机 · Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "PingFang SC", sans-serif;
    }
    #game {
      display: block;
      background: #0a0e1a;
      box-shadow: 0 0 40px rgba(80, 180, 255, 0.15);
      cursor: none; /* 隐藏系统鼠标，用自定义准星感 */
      touch-action: none;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 0;
      right: 0;
      text-align: center;
      color: #7fd0ff;
      font-size: 14px;
      letter-spacing: 1px;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 6px rgba(80, 180, 255, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">分数: 0</div>
  <script src="game.js"></script>
</body>
</html>
